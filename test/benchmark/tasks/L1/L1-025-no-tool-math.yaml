id: "L1-025"
title: "数学题不应调工具"
level: "L1"
category: "no-tool"
weight: 1.0

user_input: "2 加 3 等于几？"

hard_assertions:
  - type: tool_not_called
    tool: "fs__read_file"
  - type: tool_not_called
    tool: "fs__list_directory"
  - type: tool_not_called
    tool: "exec__execute_command"
  - type: tool_not_called
    tool: "grep__grep"
  - type: final_text_contains
    contains: "5"
  - type: no_error_5xx

soft_assertions:
  - type: final_text_min_len
    chars: 1
    weight: 0.5
  - type: tool_call_count_max
    max: 0
    weight: 0.5

runtime:
  timeout_sec: 60
  runs: 5
  max_rounds: null
  layer: "L2"
