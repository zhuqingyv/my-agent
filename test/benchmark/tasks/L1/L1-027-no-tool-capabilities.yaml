id: "L1-027"
title: "询问能力不应调工具"
level: "L1"
category: "no-tool"
weight: 1.0

user_input: "你能做什么？用一句话介绍自己"

hard_assertions:
  - type: tool_not_called
    tool: "fs__read_file"
  - type: tool_not_called
    tool: "fs__list_directory"
  - type: tool_not_called
    tool: "exec__execute_command"
  - type: tool_not_called
    tool: "grep__grep"
  - type: final_text_min_chars
    min: 10
  - type: no_error_5xx

soft_assertions:
  - type: final_text_min_len
    chars: 15
    weight: 0.5
  - type: tool_call_count_max
    max: 0
    weight: 0.5

runtime:
  timeout_sec: 60
  runs: 5
  max_rounds: null
  layer: "L2"
