id: "L1-028"
title: "一般建议不应调工具"
level: "L1"
category: "no-tool"
weight: 1.0

user_input: "我想用 React + Vite 建新项目，大概需要哪些配置？只给建议，不要动当前目录"

hard_assertions:
  - type: tool_not_called
    tool: "fs__read_file"
  - type: tool_not_called
    tool: "fs__list_directory"
  - type: tool_not_called
    tool: "fs__write_file"
  - type: tool_not_called
    tool: "exec__execute_command"
  - type: tool_not_called
    tool: "grep__grep"
  - type: final_text_min_chars
    min: 10
  - type: no_error_5xx

soft_assertions:
  - type: final_text_min_len
    chars: 20
    weight: 0.5
  - type: tool_call_count_max
    max: 0
    weight: 0.5

runtime:
  timeout_sec: 90
  runs: 5
  max_rounds: null
  layer: "L2"
