id: "L1-008"
title: "创建 JSON 文件"
level: "L1"
category: "write-file"
weight: 1.0

fixture:
  project: "simple-node-project"

user_input: '创建 data.json 文件，内容是 {"ok": true}'

hard_assertions:
  - type: tool_called
    tool_matches: "^fs(-edit)?__(write_file|file_edit)$"
  - type: file_exists
    path: "data.json"
  - type: file_content
    path: "data.json"
    contains: "ok"
  - type: no_error_5xx

soft_assertions:
  - type: final_text_min_len
    chars: 3
    weight: 0.5
  - type: tool_call_count_max
    max: 2
    weight: 0.5

runtime:
  timeout_sec: 120
  runs: 5
  max_rounds: null
  layer: "L2"
