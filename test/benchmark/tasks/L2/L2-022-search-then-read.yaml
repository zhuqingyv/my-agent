id: "L2-022"
title: "搜索后读文件"
level: "L2"
category: "multi-step"
weight: 1.0

fixture:
  project: "simple-node-project"

user_input: "先搜一下哪些文件用了 useState，然后读出其中一个文件的内容告诉我"

hard_assertions:
  - type: tool_called
    tool: "grep__grep"
    args_contains:
      pattern: "useState"
  - type: tool_called
    tool: "fs__read_file"
  - type: final_text_contains
    contains: "useState"
  - type: no_error_5xx

soft_assertions:
  - type: final_text_min_len
    chars: 15
    weight: 0.3
  - type: tool_call_count_max
    max: 4
    weight: 0.4
  - type: duration_max
    ms: 180000
    weight: 0.3

runtime:
  timeout_sec: 240
  runs: 5
  max_rounds: null
  layer: "L2"
