id: "L2-007"
title: "项目概览多轮追问"
level: "L2"
category: "multi-turn"
weight: 1.0

fixture:
  project: "simple-node-project"

rounds:
  - user: "这个项目是干什么的？"
    expect:
      tool_calls_include: ["fs__list_directory"]
  - user: "详细说说它用了什么技术栈"
  - user: "还有什么不足之处？"

hard_assertions:
  - type: tool_called
    tool_matches: "^fs__(list_directory|read_file)$"
  - type: final_text_contains
    contains: "react"
  - type: final_text_min_chars
    chars: 20
  - type: no_error_5xx

soft_assertions:
  - type: final_text_min_len
    chars: 30
    weight: 0.3
  - type: tool_call_count_max
    max: 5
    weight: 0.4
  - type: duration_max
    ms: 180000
    weight: 0.3

runtime:
  timeout_sec: 240
  runs: 5
  max_rounds: null
  layer: "L2"
