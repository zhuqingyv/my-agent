id: "L2-002"
title: "README 末尾追加一行"
level: "L2"
category: "read-modify-write"
weight: 1.0

fixture:
  project: "simple-node-project"

user_input: "在 README.md 末尾追加一行：Built with MA"

hard_assertions:
  - type: tool_called
    tool: "fs__read_file"
    args_contains:
      path: "README.md"
  - type: tool_called
    tool_matches: "^fs(-edit)?__(file_edit|write_file)$"
  - type: file_content
    path: "README.md"
    contains: "Built with MA"
  - type: file_content
    path: "README.md"
    contains: "Test Project"
  - type: no_error_5xx

soft_assertions:
  - type: final_text_min_len
    chars: 5
    weight: 0.3
  - type: tool_call_count_max
    max: 4
    weight: 0.4
  - type: duration_max
    ms: 120000
    weight: 0.3

runtime:
  timeout_sec: 180
  runs: 5
  max_rounds: null
  layer: "L2"
