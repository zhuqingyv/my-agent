id: "L2-020"
title: "读 package 再跑 node"
level: "L2"
category: "multi-step"
weight: 1.0

fixture:
  project: "simple-node-project"

user_input: "先读一下 package.json，再执行 `node -v`，把两个结果一起告诉我"

hard_assertions:
  - type: tool_called
    tool: "fs__read_file"
    args_contains:
      path: "package.json"
  - type: tool_called
    tool: "exec__execute_command"
  - type: final_text_contains
    pattern: "test-project"
  - type: final_text_contains
    pattern: "v"
  - type: no_error_5xx

soft_assertions:
  - type: final_text_min_len
    chars: 15
    weight: 0.3
  - type: tool_call_count_max
    max: 4
    weight: 0.4
  - type: duration_max
    ms: 180000
    weight: 0.3

runtime:
  timeout_sec: 240
  runs: 5
  max_rounds: null
  layer: "L2"
