id: "L2-025"
title: "上下文保持：记住项目名"
level: "L2"
category: "context-keep"
weight: 1.0

fixture:
  project: "simple-node-project"

rounds:
  - user: "读一下 package.json，告诉我 name 字段"
    expect:
      tool_calls_include: ["fs__read_file"]
  - user: "读下 README.md 有什么内容"
    expect:
      tool_calls_include: ["fs__read_file"]
  - user: "回忆一下最开始我问的项目名叫什么？"

hard_assertions:
  - type: tool_called
    tool: "fs__read_file"
  - type: final_text_contains
    contains: "test-project"
  - type: no_error_5xx

soft_assertions:
  - type: final_text_min_len
    chars: 10
    weight: 0.3
  - type: tool_call_count_max
    max: 4
    weight: 0.4
  - type: duration_max
    ms: 200000
    weight: 0.3

runtime:
  timeout_sec: 260
  runs: 5
  max_rounds: null
  layer: "L2"
