id: "L2-027"
title: "多轮连续问答保持上下文"
level: "L2"
category: "context-keep"
weight: 1.0

fixture:
  project: "simple-node-project"

rounds:
  - user: "看下 src 目录里有什么文件"
    expect:
      tool_calls_include: ["fs__list_directory"]
  - user: "读一下 utils.js"
    expect:
      tool_calls_include: ["fs__read_file"]
  - user: "它导出了什么函数？"
  - user: "刚才我让你看的目录是哪个？"

hard_assertions:
  - type: tool_called
    tool: "fs__list_directory"
  - type: tool_called
    tool: "fs__read_file"
  - type: final_text_contains
    pattern: "src"
  - type: no_error_5xx

soft_assertions:
  - type: final_text_min_len
    chars: 5
    weight: 0.3
  - type: tool_call_count_max
    max: 5
    weight: 0.4
  - type: duration_max
    ms: 240000
    weight: 0.3

runtime:
  timeout_sec: 300
  runs: 5
  max_rounds: null
  layer: "L2"
