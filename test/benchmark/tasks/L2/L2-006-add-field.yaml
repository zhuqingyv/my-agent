id: "L2-006"
title: "JSON 加字段"
level: "L2"
category: "read-modify-write"
weight: 1.0

fixture:
  project: "simple-node-project"
  setup:
    - 'echo ''{"name": "demo"}'' > data.json'

user_input: "在 data.json 里加一个 version 字段，值为字符串 1.0.0"

hard_assertions:
  - type: tool_called
    tool: "fs__read_file"
    args_contains:
      path: "data.json"
  - type: tool_called
    tool_matches: "^fs(-edit)?__(file_edit|write_file)$"
  - type: file_content
    path: "data.json"
    contains: "version"
  - type: file_content
    path: "data.json"
    contains: "1.0.0"
  - type: no_error_5xx

soft_assertions:
  - type: final_text_min_len
    chars: 5
    weight: 0.3
  - type: tool_call_count_max
    max: 4
    weight: 0.4
  - type: duration_max
    ms: 120000
    weight: 0.3

runtime:
  timeout_sec: 180
  runs: 5
  max_rounds: null
  layer: "L2"
