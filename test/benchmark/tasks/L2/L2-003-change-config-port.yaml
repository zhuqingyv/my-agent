id: "L2-003"
title: "修改 config.json 端口"
level: "L2"
category: "read-modify-write"
weight: 1.0

fixture:
  project: "simple-node-project"
  setup:
    - 'echo ''{"port": 3000, "host": "localhost"}'' > config.json'

user_input: "把 config.json 里的 port 从 3000 改成 8080"

hard_assertions:
  - type: tool_called
    tool: "fs__read_file"
    args_contains:
      path: "config.json"
  - type: tool_called
    tool_matches: "^fs(-edit)?__(file_edit|write_file)$"
  - type: file_content
    path: "config.json"
    contains: "8080"
    not_contains: "3000"
  - type: no_error_5xx

soft_assertions:
  - type: final_text_min_len
    chars: 5
    weight: 0.3
  - type: tool_call_count_max
    max: 4
    weight: 0.4
  - type: duration_max
    ms: 120000
    weight: 0.3

runtime:
  timeout_sec: 180
  runs: 5
  max_rounds: null
  layer: "L2"
