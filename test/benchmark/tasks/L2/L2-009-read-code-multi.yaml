id: "L2-009"
title: "代码阅读多轮"
level: "L2"
category: "multi-turn"
weight: 1.0

fixture:
  project: "simple-node-project"

rounds:
  - user: "看下 src 目录结构"
    expect:
      tool_calls_include: ["fs__list_directory"]
  - user: "读下入口文件"
    expect:
      tool_calls_include: ["fs__read_file"]
  - user: "这个文件做了什么？简单说说"

hard_assertions:
  - type: tool_called
    tool: "fs__list_directory"
  - type: tool_called
    tool: "fs__read_file"
  - type: final_text_min_chars
    chars: 10
  - type: no_error_5xx

soft_assertions:
  - type: final_text_min_len
    chars: 15
    weight: 0.3
  - type: tool_call_count_max
    max: 5
    weight: 0.4
  - type: duration_max
    ms: 180000
    weight: 0.3

runtime:
  timeout_sec: 240
  runs: 5
  max_rounds: null
  layer: "L2"
